services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped

  dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    working_dir: /app
    command: sleep infinity
    profiles:
      - dev
