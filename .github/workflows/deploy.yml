name: Deploy

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Tofu Init
        working-directory: infra
        run: tofu init -backend-config=backend.hcl

      - name: Tofu Apply
        working-directory: infra
        run: tofu apply -auto-approve

      - name: Get Web App name
        id: infra
        working-directory: infra
        run: echo "webapp_name=$(tofu output -raw web_app_name)" >> "$GITHUB_OUTPUT"

      - name: Deploy container to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.infra.outputs.webapp_name }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
